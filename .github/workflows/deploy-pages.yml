name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build site
        run: SITE_ORIGIN="https://rhnvrm.github.io/sketch-is-more" npm run build

      - name: Verify public release metadata
        run: SITE_ORIGIN="https://rhnvrm.github.io/sketch-is-more" npm run verify:public

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp \
            app.js \
            book-data.js \
            index.html \
            reader.html \
            robots.txt \
            site.js \
            site.webmanifest \
            sitemap.xml \
            styles.css \
            sw.js \
            visit-state.js \
            _site/
          cp -R public _site/public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
